<div class="layout demo-layout">
  <aol-map class="map demo-map" (moveStart)="startMoving()" (moveEnd)="displayCoordinates()">
    <aol-view #view [zoom]="form.controls.zoom.value" [center]="center()"></aol-view>

    <aol-layer-tile>
      <aol-source-osm></aol-source-osm>
    </aol-layer-tile>

    <aol-interaction-default></aol-interaction-default>
    <aol-control-scaleline></aol-control-scaleline>
    <aol-control-zoom></aol-control-zoom>
    <aol-control-attribution></aol-control-attribution>
  </aol-map>

  <aside class="panel demo-panel">
    <section class="section">
      <h2>Map coordinates</h2>
      <p>Longitude: {{ moving() ? '----' : currentLongitude().toFixed(6) }}</p>
      <p>Latitude: {{ moving() ? '----' : currentLatitude().toFixed(6) }}</p>
      <p>Zoom: {{ moving() ? '----' : currentZoom() }}</p>
    </section>

    <section class="section">
      <h2>Update coordinates</h2>
      <form class="form" [formGroup]="form">
        <label class="field">
          <span>Longitude</span>
          <input type="number" step="0.0001" formControlName="x" />
        </label>
        <label class="field">
          <span>Latitude</span>
          <input type="number" step="0.0001" formControlName="y" />
        </label>
        <label class="field">
          <span>Zoom</span>
          <input type="number" min="0" step="1" formControlName="zoom" />
        </label>
      </form>
    </section>
  </aside>
</div>

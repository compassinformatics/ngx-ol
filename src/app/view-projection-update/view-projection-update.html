<div class="layout demo-layout">
  <aol-map class="map demo-map">
    <aol-view [zoom]="zoom()" [center]="center()" [projection]="viewProjection()"></aol-view>

    <aol-layer-tile>
      <aol-source-osm></aol-source-osm>
    </aol-layer-tile>

    <aol-layer-vector>
      <aol-source-vector>
        <aol-feature>
          <aol-geometry-point>
            <aol-coordinate [x]="5" [y]="45" srid="EPSG:4326"></aol-coordinate>
          </aol-geometry-point>
          <aol-style>
            <aol-style-circle [radius]="10">
              <aol-style-stroke color="black" [width]="2"></aol-style-stroke>
              <aol-style-fill color="green"></aol-style-fill>
            </aol-style-circle>
          </aol-style>
        </aol-feature>

        <aol-feature>
          <aol-geometry-point>
            <aol-coordinate [x]="5.1" [y]="45.1" srid="EPSG:4326"></aol-coordinate>
          </aol-geometry-point>
          <aol-style>
            <aol-style-icon
              src="assets/marker.svg"
              [anchor]="[0.5, 1]"
              anchorXUnits="fraction"
              anchorYUnits="fraction"
              [scale]="1.2"
              anchorOrigin="top-left"
            >
            </aol-style-icon>
          </aol-style>
        </aol-feature>
      </aol-source-vector>
    </aol-layer-vector>

    <aol-interaction-default></aol-interaction-default>
    <aol-control-scaleline></aol-control-scaleline>
    <aol-control-zoom></aol-control-zoom>
    <aol-control-attribution></aol-control-attribution>
  </aol-map>

  <aside class="panel demo-panel">
    <h2>View projection</h2>
    <label for="view-projection-select">Current projection</label>
    <select
      id="view-projection-select"
      [value]="viewProjection()"
      (change)="setProjection($any($event.target).value)"
    >
      <option value="EPSG:3857">EPSG:3857</option>
      <option value="EPSG:4326">EPSG:4326</option>
    </select>
  </aside>
</div>

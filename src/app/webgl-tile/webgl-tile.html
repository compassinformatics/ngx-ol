<div class="layout demo-layout">
  <aol-map class="demo-map">
    <aol-view [zoom]="zoom()" [center]="center()"></aol-view>

    <aol-layer-webgltile [style]="style()">
      <aol-source-imagetile [url]="sourceUrl" crossOrigin="anonymous"></aol-source-imagetile>
    </aol-layer-webgltile>

    <aol-interaction-default></aol-interaction-default>
    <aol-control-scaleline></aol-control-scaleline>
    <aol-control-zoom></aol-control-zoom>
    <aol-control-attribution></aol-control-attribution>
  </aol-map>

  <aside class="panel demo-panel">
    <section class="section">
      <h2>WebGLTile</h2>
      <p>This map renders image tiles through <code>aol-layer-webgltile</code> and <code>aol-source-imagetile</code>.</p>
      <p><code>{{ sourceUrl }}</code></p>
    </section>
  </aside>
</div>

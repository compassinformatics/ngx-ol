<div class="layout demo-layout">
  <aol-map class="demo-map">
    <aol-view [zoom]="zoom()" [center]="center()"></aol-view>

    <aol-layer-tile>
      <aol-source-osm></aol-source-osm>
    </aol-layer-tile>

    <aol-layer-heatmap [blur]="blur()" [radius]="radius()" [weight]="'weight'">
      <aol-source-vector [features]="features()"></aol-source-vector>
    </aol-layer-heatmap>

    <aol-interaction-default></aol-interaction-default>
    <aol-control-scaleline></aol-control-scaleline>
    <aol-control-zoom></aol-control-zoom>
    <aol-control-attribution></aol-control-attribution>
  </aol-map>

  <aside class="panel demo-panel">
    <section class="section">
      <h2>Heatmap settings</h2>
      <label class="field">
        <span>Radius: {{ radius() }} px</span>
        <input #radiusInput type="range" min="4" max="32" [value]="radius()" (input)="setRadius(radiusInput.valueAsNumber)" />
      </label>
      <label class="field">
        <span>Blur: {{ blur() }} px</span>
        <input #blurInput type="range" min="4" max="40" [value]="blur()" (input)="setBlur(blurInput.valueAsNumber)" />
      </label>
      <p>{{ features().length }} weighted point features are being rendered through <code>aol-layer-heatmap</code>.</p>
    </section>
  </aside>
</div>

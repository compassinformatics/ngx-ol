<div class="layout demo-layout">
  <aol-map class="map demo-map" (pointerMove)="displayInfo($event)">
    <aol-view #view [zoom]="zoom()" [center]="center()"></aol-view>

    <aol-layer-tile>
      <aol-source-osm></aol-source-osm>
    </aol-layer-tile>

    <aol-layer-tile [opacity]="0.85">
      <aol-source-xyz [url]="pointsTileUrl()"></aol-source-xyz>
    </aol-layer-tile>

    <aol-layer-tile>
      <aol-source-utfgrid #utfGridSource [tileJSON]="utfGridConfig()"> </aol-source-utfgrid>
    </aol-layer-tile>

    <aol-interaction-default></aol-interaction-default>
    <aol-control-fullscreen></aol-control-fullscreen>
    <aol-control-scaleline></aol-control-scaleline>
    <aol-control-zoom></aol-control-zoom>
    <aol-control-attribution></aol-control-attribution>
  </aol-map>

  <aside class="panel demo-panel">
    <h2>Hovered info</h2>
    <pre>{{ hoveredInfo() }}</pre>
  </aside>
</div>
